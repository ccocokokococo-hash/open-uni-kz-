<!DOCTYPE html>
<html lang="kk">
<head>
  <meta charset="UTF-8">
  <title>Тест</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<h1 style="text-align:center;">Мамандық тесті</h1>

<!-- ПРОГРЕСС -->
<div style="width:80%;margin:auto;height:6px;background:#eee;border-radius:10px;">
  <div id="progressBar" style="height:6px;width:0%;background:#6366f1;border-radius:10px;"></div>
</div>

<!-- ТЕСТ -->
<div id="quizContainer" style="max-width:800px;margin:30px auto;">
  <form id="quizForm"></form>
</div>

<!-- КНОПКА -->
<div style="text-align:center;">
  <button id="submitQuiz" class="btn">Нәтижені көру</button>
</div>

<!-- РЕЗУЛЬТАТ -->
<div id="quizResultBox" style="max-width:800px;margin:30px auto;"></div>

<script src="js/quiz.js"></script>

</body>
</html>
